name: Notebooks

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  run-notebooks:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -e .
          pip install jupyter nbconvert ipykernel
          python -m ipykernel install --user --name python3

      - name: Run single spectrum tutorial
        working-directory: tutorials
        env:
          MPLBACKEND: Agg
        run: jupyter nbconvert --to notebook --execute quickstart_single_spectrum.ipynb --output executed_single.ipynb
        timeout-minutes: 10

      - name: Run batch spectra tutorial
        working-directory: tutorials
        env:
          MPLBACKEND: Agg
        run: jupyter nbconvert --to notebook --execute quickstart_batch_spectra.ipynb --output executed_batch.ipynb
        timeout-minutes: 10
